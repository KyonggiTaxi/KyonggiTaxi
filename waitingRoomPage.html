<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>택시팟 대기실</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #dce8f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #dce8f5;
      display: flex;
      flex-direction: column;
    }

    /* ── 네비바 ── */
    .navbar {
      background: #8aafd6;
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      background: #d0e4f5;
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #b8d2ec; }
    .back-btn svg { width: 22px; height: 22px; fill: #2b4e8f; }

    .nav-title {
      font-size: 20px;
      font-weight: 900;
      color: white;
      letter-spacing: 6px;
      flex: 1;
      text-align: left;
    }

    /* ── 방 정보 카드 ── */
    .room-info-card {
      background: white;
      margin: 14px 14px 0;
      border-radius: 18px;
      padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(100,140,200,0.12);
      border: 1.5px solid #d0e2f2;
    }

    .room-info-title {
      font-size: 14px;
      font-weight: 700;
      color: #8aafd6;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f5fb;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-label {
      color: #8aafd6;
      font-weight: 700;
      font-size: 12px;
      width: 44px;
      flex-shrink: 0;
    }
    .info-value {
      color: #2b4e8f;
      font-weight: 600;
      font-size: 14px;
      flex: 1;
    }
    .info-badge {
      background: #dce8f5;
      color: #2b4e8f;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 멤버 카드 ── */
    .card {
      background: white;
      border-radius: 22px;
      margin: 12px 14px 0;
      padding: 20px 16px;
      box-shadow: 0 2px 12px rgba(100,140,200,0.10);
      border: 1.5px solid #d0e2f2;
      flex: 1;
    }

    .card-header {
      font-size: 13px;
      font-weight: 700;
      color: #8aafd6;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .user-list { display: flex; flex-direction: column; gap: 10px; }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f4f8fd;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .avatar {
      width: 38px; height: 38px; min-width: 38px;
      border-radius: 50%;
      background: #3a68b5;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar svg { width: 20px; height: 20px; fill: white; }

    .user-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #2b4e8f;
    }

    .host-badge {
      background: #2b4e8f;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .check-btn {
      width: 36px; height: 36px; min-width: 36px;
      border-radius: 50%;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .check-btn:active { transform: scale(0.9); }
    .check-btn.on  { background: #8aafd6; }
    .check-btn.off { background: #c8d8ea; }
    .check-btn svg {
      width: 16px; height: 16px;
      stroke: white; stroke-width: 3;
      fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .empty-message {
      text-align: center;
      color: #9ab8d4;
      font-size: 13px;
      padding: 30px 0 10px;
      font-weight: 500;
    }

    /* ── 하단 버튼 ── */
    .bottom-area {
      padding: 14px;
      display: flex;
      gap: 10px;
    }

    .chat-btn {
      flex: 1;
      background: #8aafd6;
      color: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .chat-btn:hover  { background: #6a9ac4; }
    .chat-btn:active { transform: scale(0.97); }

    .confirm-btn {
      flex: 1;
      background: #2b4e8f;
      color: white;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .confirm-btn:hover  { background: #3a60a8; }
    .confirm-btn:active { transform: scale(0.97); }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px;
      padding: 28px 24px; width: 300px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.18);
      animation: popIn 0.22s ease;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.88); }
      to   { opacity:1; transform:scale(1); }
    }
    .modal h3 { font-size:16px; font-weight:700; color:#2b4d8e; margin-bottom:12px; text-align:center; }
    .modal p  { font-size:14px; color:#4a6a9a; text-align:center; margin-bottom:20px; line-height:1.6; }
    .modal-btns { display:flex; gap:10px; }
    .modal-btns button {
      flex:1; padding:12px; border-radius:10px; border:none;
      font-family:'Noto Sans KR',sans-serif;
      font-size:14px; font-weight:700; cursor:pointer;
    }
    .btn-cancel  { background:#eef4fb; color:#6b9fd4; }
    .btn-confirm { background:#2b4d8e; color:white; }

    /* ── 토스트 ── */
    .toast {
      position:fixed; bottom:30px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:#2b4e8f; color:white;
      padding:10px 22px; border-radius:30px;
      font-size:13px; font-weight:500;
      opacity:0; transition:opacity 0.3s, transform 0.3s;
      z-index:200; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="app">

    <!-- 네비바 -->
    <div class="navbar">
      <button class="back-btn" onclick="leaveRoom()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="nav-title">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;대 기 실</div>
    </div>

    <!-- 방 정보 카드 -->
    <div class="room-info-card">
      <div class="room-info-title" style="display:flex; justify-content:space-between; align-items:center;">
          <span>🚕 방 정보</span>
          <span class="info-badge" id="infoRoomName"></span>
      </div>
      <div class="info-row">
        <span class="info-label">경 로</span>
        <span class="info-value" id="infoRoute">불러오는 중...</span>
      </div>
      <div class="info-row">
        <span class="info-label">계 좌</span>
        <span class="info-value" id="infoAccount">-</span>
      </div>
      <div class="info-row">
          <span class="info-label">인 원</span>
          <span class="info-value" id="infoCount">-</span>
      </div>
    </div>

    <!-- 멤버 카드 -->
    <div class="card">
      <div class="card-header">👥 택티 후보</div>
      <div class="user-list" id="userList"></div>
      <div id="emptyMessage" class="empty-message">아직 대기 중인 택티가 없습니다 🚕</div>
    </div>

    <!-- 택티 대기 메시지 -->
    <div id="waitMsg" style="display:none; text-align:center; padding:14px; color:#8aafd6; font-size:14px; font-weight:600;">
      ⏳ 택터의 수락을 기다리는 중...
    </div>

    <!-- 하단 버튼 -->
    <div class="bottom-area">
      <button class="chat-btn" onclick="window.location.href='chatPage.html'">채 팅 방</button>
      <button class="confirm-btn" onclick="openModal()">택티 선택</button>
    </div>

  </div>

  <!-- 탑승 확인 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>🚕 택티 확인</h3>
      <p>택티로<br>선택 하시겠습니까?</p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-confirm" onclick="confirmBoarding()">확인</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const store = {
        get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
        set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) {} },
        remove: (k) => { try { localStorage.removeItem(k); } catch(e) {} }
    };
    const personIcon = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
    const checkIcon  = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

    let room = null;
    let users = [];

    function getCurrentRoom() {
      return room;
    }

    function updateRoomInfo() {
      if (!room) return;
      document.getElementById('infoRoute').textContent   = (room.from || '?') + '  →  ' + (room.to || '?');
      document.getElementById('infoAccount').textContent = (room.bank ? room.bank + '  ' : '') + (room.account || '미설정');
      document.getElementById('infoCount').textContent   = (room.cur || 1) + '명 / ' + (room.max || 4) + '명';
      document.getElementById('infoRoomName').textContent = room.name || '';
      const isHost = (store.get('nickname') || '') === room.host;
      document.querySelector('.chat-btn').style.display = isHost ? 'block' : 'none';
      document.querySelector('.confirm-btn').style.display = isHost ? 'block' : 'none';

      // 택티: 수락 대기 메시지
      const waitMsg = document.getElementById('waitMsg');
      if (!isHost) {
        if (waitMsg) waitMsg.style.display = 'block';
      } else {
        if (waitMsg) waitMsg.style.display = 'none';
      }

      // 택티: 수락되면 자동 이동
      const nickname = store.get('nickname') || '';
      const accepted = room.acceptedMembers || [];
      if (!isHost && accepted.includes(nickname)) {
        showToast('탑승이 확정됐습니다! 채팅방으로 이동합니다');
        setTimeout(() => { window.location.href = 'chatPage.html'; }, 900);
      }
    }

    function render() {
      const list  = document.getElementById('userList');
      const empty = document.getElementById('emptyMessage');
      list.innerHTML = '';
      const nonHostUsers = users.filter(u => u.id !== room.host);
      if (nonHostUsers.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      nonHostUsers.forEach((u, i) => {
        const isHost = room && u.id === room.host;
        const row = document.createElement('div');
        row.className = 'user-row';
        const isSelf = u.id === (store.get('nickname') || '');
        row.innerHTML =
            '<div class="avatar">' + personIcon + '</div>' +
            '<div class="user-name">' + u.id + '</div>' +
            (u.id === room.host ? '<span class="host-badge">택터</span>' : '') +
            (isHost && !isSelf ? '<button type="button" class="check-btn ' + (u.checked ? 'on' : 'off') + '" onclick="toggle(event,' + i + ')">' + checkIcon + '</button>' : '');
      list.appendChild(row);
      });
    }

    function toggle(e, i) {
      e.stopPropagation();
      users[i].checked = !users[i].checked;
      render();
    }

    function openModal() {
      const selected = users.filter(u => u.checked);
      if (selected.length === 0) { showToast('함께 탑승할 택티를 선택해주세요'); return; }
      document.getElementById('modalOverlay').classList.add('open');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    async function confirmBoarding() {
      const selected = users.filter(u => u.checked).map(u => u.id);

      if (selected.length === 0) {
        showToast('선택된 택티가 없습니다');
        return;
      }

      const currentMembers = room.members || [];
      const newMembers = [...new Set([...currentMembers, ...selected])];

      if (newMembers.length > room.max) {
        showToast(`최대 ${room.max}명까지 입장 가능합니다`);
        closeModal();
        return;
      }

      await updateDoc(doc(db, "rooms", room.id), {
        members: newMembers,
        cur: newMembers.length,
        acceptedMembers: selected
      });

      try { store.set('currentRoomId', room.id); } catch(e) {}
      closeModal();
      showToast('택티 선택 확인! 채팅방으로 이동합니다');
      setTimeout(() => { window.location.href = 'chatPage.html'; }, 900);
    }

    async function leaveRoom() {
        const nickname = store.get('nickname') || '';
        const roomId = store.get('currentRoomId');
        if (nickname && roomId && window.updateDoc && window.doc && window.db) {
            try {
                await window.updateDoc(window.doc(window.db, 'rooms', roomId), {
                    members: window.arrayRemove(nickname)
                });
            } catch(e) { console.error('나가기 실패', e); }
        }
        store.remove('currentRoomId');
        window.location.href = 'mainPage.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      onSnapshot,
      doc,
      updateDoc,
      deleteDoc,
      arrayRemove
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDvFEypLTMRwfRMcnQaBQevFAKHMu-zsbc",
      authDomain: "kyonggitaxi.firebaseapp.com",
      projectId: "kyonggitaxi",
      storageBucket: "kyonggitaxi.firebasestorage.app",
      messagingSenderId: "518555765082",
      appId: "1:518555765082:web:34eee83ec31369d00d0b63",
      measurementId: "G-30G3VDXZVV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.onSnapshot = onSnapshot;
    window.doc = doc;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.arrayRemove = arrayRemove;

    const roomId = store.get('currentRoomId');

    onSnapshot(doc(db, "rooms", roomId), (docSnap) => {
      if (!docSnap.exists()) {
        alert('방 정보를 찾을 수 없습니다.');
        window.location.href = 'mainPage.html';
        return;
      }

      const data = docSnap.data();
      room = {
        id: docSnap.id,
        ...data,
        cur: (data.members || []).length
      };

      users = (room.members || []).map(m => ({
        id: m,
        checked: false
      }));

      updateRoomInfo();
      render();
    });
  </script>
</body>
</html>
