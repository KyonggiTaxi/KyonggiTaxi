<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>경택</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --yellow: #F5C200;
      --yellow-dark: #e0b000;
      --sky: #c8dff0;
      --sky-light: #dceef9;
      --text-dark: #1a1a1a;
      --text-mid: #444;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--sky-light);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .phone-wrap {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #daeef9 0%, #c5e0f0 40%, #b8d9ee 100%);
    }

    /* ── TOP UI AREA ── */
    .top-section {
      position: relative;
      z-index: 10;
      padding: 52px 28px 24px;
      animation: fadeDown 0.6s ease both;
    }

    .app-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-mid);
      text-align: center;
      line-height: 1.6;
      word-break: keep-all;
    }

    /* ── INPUT AREA ── */
    .login-box {
      position: relative;
      z-index: 10;
      padding: 0 28px;
      margin-top: 10px;
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .input-row {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.88);
      border-radius: 50px;
      padding: 6px 18px 6px 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 14px;
      border: 1.5px solid rgba(255,255,255,0.9);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--yellow);
      box-shadow: 0 4px 24px rgba(245,194,0,0.25);
    }

    .input-icon {
      width: 38px;
      height: 38px;
      background: #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .input-icon svg {
      width: 20px;
      height: 20px;
      fill: #888;
    }

    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      outline: none;
      padding: 10px 0;
    }

    .input-row input::placeholder {
      color: #aaa;
      font-weight: 400;
    }

    .btn-start {
      width: 100%;
      padding: 16px;
      background: var(--yellow);
      border: none;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(245,194,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .btn-start:active {
      transform: scale(0.97);
      box-shadow: 0 3px 10px rgba(245,194,0,0.3);
      background: var(--yellow-dark);
    }

    /* ── BACKGROUND ILLUSTRATION ── */
    .bg-illustration {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      /* show the background image */
      background-image: url("images/메인경택.png"); 
      background-size: cover;
      background-position: center bottom;
      height: 65%;
      z-index: 1;
    }

    /* Fade overlay so top blends nicely */
    .bg-illustration::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, #c8dff0 0%, transparent 100%);
      z-index: 2;
    }

    /* spacer to push illustration down */
    .spacer {
      flex: 1;
      min-height: 40px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="phone-wrap">

    <!-- TOP: title + input -->
    <div class="top-section">
      <h1 class="app-title">경 택</h1>
      <p class="subtitle">계좌이체할 때 설정한 아이디로 송금<br>하면 개인정보를 지킬 수 있어요!</p>
    </div>

    <div class="login-box">
      <div class="input-row">
        <div class="input-icon">
          <!-- person icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <input type="text" id="username" placeholder="닉네임을 기입하여 주세요." />
      </div>

      <button class="btn-start" id="startBtn">
         start
      </button>
    </div>

    <div class="spacer"></div>

    <!-- Background illustration -->
    <div class="bg-illustration"></div>

  </div>
  <script>
    const startBtn = document.getElementById('startBtn');

    startBtn.addEventListener('click', () => {
      const usernameInput = document.getElementById('username');
      const username = usernameInput.value.trim();
      if (username === '') {
        alert('닉네임을 기입하여 주세요.');
        usernameInput.focus();
        return;
      }
      localStorage.setItem('nickname', username);
      startBtn.disabled = true;
      startBtn.style.opacity = '0.5';
      setTimeout(() => { window.location.href = 'mainPage.html'; }, 300);
    });
  </script>
</body>
</html>
